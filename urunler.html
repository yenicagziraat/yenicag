<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ürünler | Yeniçağ Ziraat Makineleri</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#2e7d32;
color:white;
padding:30px;
text-align:center;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
max-width:1200px;
margin:auto;
}

.card{
background:white;
border-radius:10px;
padding:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
border-radius:8px;
}

button{
margin-top:10px;
padding:10px 20px;
background:#2e7d32;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<h1>Ürünlerimiz</h1>
</header>

<div class="products">

<div class="card">
<img src="makine1.jpg">
<h3>Çiçek Seyreltme Makinesi</h3>
<p>Verimli hasat için profesyonel çözüm.</p>
<button>Detay</button>
</div>

<div class="card">
<img src="makine2.jpg">
<h3>Meyve Hasat Makinesi</h3>
<p>Hızlı ve kolay hasat.</p>
<button>Detay</button>
</div>

<div class="card">
<img src="makine3.jpg">
<h3>Traktör Aparatları</h3>
<p>Dayanıklı üretim.</p>
<button>Detay</button>
</div>

</div>

</body>
</html>
